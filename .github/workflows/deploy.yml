name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: both
        type: choice
        options:
          - backend
          - frontend
          - both
      branch:
        description: Git branch to deploy
        required: true
        default: make-ready-for-depployment
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            BRANCH="${{ github.event.inputs.branch }}"
            TARGET="${{ github.event.inputs.target }}"
            APP_DIR="/opt/vsl360"

            echo ">> Deploy starting: target=$TARGET branch=$BRANCH"

            cd "$APP_DIR"
            git fetch origin
            git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH" "origin/$BRANCH"
            git pull origin "$BRANCH"
            echo ">> Code at $(git rev-parse --short HEAD)"

            if [ "$TARGET" = "backend" ] || [ "$TARGET" = "both" ]; then
              echo ">> Building backend..."
              docker compose build backend
              docker compose up -d backend
              echo ">> Backend deployed"
            fi

            if [ "$TARGET" = "frontend" ] || [ "$TARGET" = "both" ]; then
              echo ">> Building frontend..."
              docker compose build frontend
              docker compose up -d frontend
              echo ">> Frontend deployed"
            fi

            # Health check
            sleep 5
            if curl -sf http://localhost:3000/api/health > /dev/null; then
              echo ">> Health check passed"
            else
              echo ">> WARNING: Health check failed"
            fi

            echo ">> Deploy complete: $(git rev-parse --short HEAD) at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"