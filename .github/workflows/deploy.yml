name: Deploy VSL360

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  BACKEND_APP_DIR: /home/adminvisitsrilan/vsl360-backend
  FRONTEND_DIR: /home/adminvisitsrilan/public_html

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      # Build Frontend
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.admin.visitsrilanka360.com/api
      
      - name: Create frontend dist artifact
        run: tar -czf vsl360-frontend-dist.tar.gz -C frontend dist
      
      # Build Backend
      - name: Install backend dependencies
        working-directory: ./backend
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: npm ci --no-audit --no-fund
      
      - name: Build backend
        working-directory: ./backend
        run: npm run build
      
      - name: Create backend artifact
        run: |
          tar -czf vsl360-backend-release.tar.gz \
            -C backend dist node_modules package.json package-lock.json prisma
      
      # Upload artifacts
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: vsl360-frontend-dist.tar.gz
          retention-days: 5
      
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: vsl360-backend-release.tar.gz
          retention-days: 5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
      
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-release
      
      - name: Deploy to cPanel
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          CPANEL_SSH_PASSPHRASE: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Add to known_hosts
          ssh-keyscan -H $CPANEL_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Deploy frontend
          echo "Deploying frontend..."
          scp -i ~/.ssh/deploy_key vsl360-frontend-dist.tar.gz ${CPANEL_USER}@${CPANEL_HOST}:/home/${CPANEL_USER}/
          
          ssh -i ~/.ssh/deploy_key ${CPANEL_USER}@${CPANEL_HOST} << 'EOF'
            cd /home/$USER
            tar -xzf vsl360-frontend-dist.tar.gz
            rm -rf public_html/* && mv dist/* public_html/
            # Restore .htaccess and .well-known
            [ -f .htaccess.bak ] && cp .htaccess.bak public_html/.htaccess
            [ -d .well-known.bak ] && cp -r .well-known.bak public_html/.well-known
            rm vsl360-frontend-dist.tar.gz
            echo "✓ Frontend deployed"
          EOF
          
          # Deploy backend
          echo "Deploying backend..."
          scp -i ~/.ssh/deploy_key vsl360-backend-release.tar.gz ${CPANEL_USER}@${CPANEL_HOST}:/home/${CPANEL_USER}/
          
          ssh -i ~/.ssh/deploy_key ${CPANEL_USER}@${CPANEL_HOST} << 'EOF'
            cd /home/$USER/vsl360-backend
            
            # Stop the app (if running)
            sudo systemctl stop vsl360 2>/dev/null || true
            
            # Backup current version
            [ -d dist ] && cp -r dist dist.bak
            [ -f package-lock.json ] && cp package-lock.json package-lock.json.bak
            
            # Extract new version
            tar -xzf ../vsl360-backend-release.tar.gz
            
            # Install dependencies
            PUPPETEER_SKIP_DOWNLOAD=true PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm ci --omit=dev --no-audit --no-fund --prefer-offline
            
            # Generate Prisma client
            /opt/alt/alt-nodejs20/root/usr/bin/node node_modules/.bin/prisma generate
            
            # Run migrations
            export DATABASE_URL="$(cat /home/$USER/.config/vsl360/backend.env | grep DATABASE_URL | cut -d '=' -f2-)"
            export JWT_SECRET="$(cat /home/$USER/.config/vsl360/backend.env | grep JWT_SECRET | cut -d '=' -f2-)"
            export JWT_REFRESH_SECRET="$(cat /home/$USER/.config/vsl360/backend.env | grep JWT_REFRESH_SECRET | cut -d '=' -f2-)"
            /opt/alt/alt-nodejs20/root/usr/bin/node node_modules/.bin/prisma migrate deploy
            
            # Clean up
            rm ../vsl360-backend-release.tar.gz
            
            # Start the app
            sudo systemctl start vsl360
            
            # Verify deployment
            sleep 5
            curl -s https://api.admin.visitsrilanka360.com/api/health | grep -q "ok" && echo "✓ Backend deployed" || echo "✗ Backend health check failed"
          EOF
      
      - name: Verify Deployment
        run: |
          # Check frontend
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://admin.visitsrilanka360.com/)
          echo "Frontend Status: $FRONTEND_STATUS"
          [ "$FRONTEND_STATUS" = "200" ] || exit 1
          
          # Check backend health
          BACKEND_HEALTH=$(curl -s https://api.admin.visitsrilanka360.com/api/health | grep -o "ok" || echo "fail")
          echo "Backend Health: $BACKEND_HEALTH"
          [ "$BACKEND_HEALTH" = "ok" ] || exit 1
          
          echo "✓ Deployment verified successfully"
      
      - name: Deployment Summary
        if: always()
        run: echo "Deployment job completed with status: ${{ job.status }}"
