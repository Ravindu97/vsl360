# Which env file services load (must match the file passed to: docker compose --env-file <file>)
# Local: copy .env.local.example → .env.local, then: docker compose --env-file .env.local up -d --build
# Production: docker compose --env-file .env.production up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.production}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vsl360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-vsl360}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vsl360-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vsl360}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vsl360}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vsl360}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
      - ./assets:/app/assets:ro
    networks:
      - vsl360-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.admin.visitsrilanka360.com/api}
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - vsl360-net

volumes:
  pgdata:
  uploads:

networks:
  vsl360-net:
